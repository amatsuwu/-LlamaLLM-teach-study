<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Training Pipeline Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          keyframes: {
            fadeIn: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
            slideRight: { '0%': { transform: 'translateX(-20px)', opacity: 0 }, '100%': { transform: 'translateX(0)', opacity: 1 } },
            pulseGlow: { '0%, 100%': { boxShadow: '0 0 0 0 rgba(59, 130, 246, 0.5)' }, '50%': { boxShadow: '0 0 15px 5px rgba(59, 130, 246, 0.5)' } }
          },
          animation: {
            'fadeIn': 'fadeIn 0.5s ease-out forwards',
            'slideRight': 'slideRight 0.4s ease-out forwards',
            'pulseGlow': 'pulseGlow 2s infinite',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(71, 85, 105, 0.5); }
  </style>
</head>
<body class="h-screen overflow-hidden">
  <div id="root" class="h-full"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TrainingPipeline = () => {
      // 0: Init, 1: Generated, 2: Scored, 3: Filtered, 4: SFT Done, 5: DPO Done
      const [pipelineStep, setPipelineStep] = useState(0); 
      
      // Shared Data States
      const [currentPrompt, setCurrentPrompt] = useState("");
      const [generations, setGenerations] = useState([]);
      const [chosenData, setChosenData] = useState(null);
      const [rejectedData, setRejectedData] = useState(null);
      
      // SFT & DPO Anim States
      const [sftProgress, setSftProgress] = useState(0);
      const [dpoEpoch, setDpoEpoch] = useState(0);
      const [chosenProb, setChosenProb] = useState(45);
      const [rejectedProb, setRejectedProb] = useState(38);
      const [isTraining, setIsTraining] = useState(false);

      const prompts = [
        "請解釋為什麼天空是藍色的？",
        "如何用一句話安慰失戀的朋友？",
        "寫一段 Python 程式碼反轉字串。"
      ];

      const rawAnswers = [
        [
          { id: 1, text: "因為大海是藍色的，天空反射了大海的顏色。", score: 20 },
          { id: 2, text: "太陽光進入大氣層時，藍光波長較短，更容易被空氣分子散射（瑞利散射），所以我們看到天空是藍的。", score: 95 },
          { id: 3, text: "天空本來就是藍色的，這是宇宙的自然現象。", score: 30 },
          { id: 4, text: "大氣層吸收了紅光，把藍光留下來了。", score: 45 }
        ],
        [
          { id: 1, text: "別哭了，下一個會更好啦。", score: 40 },
          { id: 2, text: "你看開點，世上好人多的是。", score: 50 },
          { id: 3, text: "我會一直陪著你，想哭就大聲哭出來吧，這不是你的錯。", score: 98 },
          { id: 4, text: "走！我們去大吃一頓忘掉他！", score: 65 }
        ],
        [
          { id: 1, text: "s[::-1]", score: 60 },
          { id: 2, text: "def rev(s): return s[::-1]", score: 92 },
          { id: 3, text: "用 for 迴圈從後面讀回來。", score: 40 },
          { id: 4, text: "reverse(s)", score: 10 }
        ]
      ];

      const handleGenerate = (idx) => {
        setCurrentPrompt(prompts[idx]);
        const initializedAns = rawAnswers[idx].map(a => ({ ...a, displayScore: null, status: 'pending' }));
        setGenerations(initializedAns);
        setPipelineStep(1);
        setChosenData(null);
        setRejectedData(null);
      };

      const handleScore = () => {
        const scored = generations.map(g => ({ ...g, displayScore: g.score }));
        setGenerations(scored);
        setPipelineStep(2);
      };

      const handleFilter = () => {
        let maxScore = -1;
        let minScore = 999;
        let bestId = -1;
        let worstId = -1;

        generations.forEach(g => {
          if (g.score > maxScore) { maxScore = g.score; bestId = g.id; }
          if (g.score < minScore) { minScore = g.score; worstId = g.id; }
        });

        const evaluated = generations.map(g => ({
          ...g,
          status: g.id === bestId ? 'accepted' : (g.id === worstId ? 'rejected_worst' : 'rejected')
        }));

        setGenerations(evaluated);
        setChosenData(evaluated.find(g => g.id === bestId));
        setRejectedData(evaluated.find(g => g.id === worstId));
        setPipelineStep(3);
      };

      const handleSftTrain = () => {
        setIsTraining(true);
        let prog = 0;
        const interval = setInterval(() => {
          prog += 10;
          setSftProgress(prog);
          if (prog >= 100) {
            clearInterval(interval);
            setIsTraining(false);
            setPipelineStep(4);
            // 進入 DPO 階段前重置機率
            setDpoEpoch(0);
            setChosenProb(45);
            setRejectedProb(40);
          }
        }, 150);
      };

      const handleDpoTrain = () => {
        setIsTraining(true);
        let ep = dpoEpoch;
        let cProb = chosenProb;
        let rProb = rejectedProb;

        const interval = setInterval(() => {
          ep += 1;
          cProb = cProb + (95 - cProb) * 0.3; 
          rProb = rProb - (rProb - 2) * 0.4;
          
          setDpoEpoch(ep);
          setChosenProb(cProb);
          setRejectedProb(rProb);

          if (ep >= 10) {
            clearInterval(interval);
            setIsTraining(false);
            setPipelineStep(5);
          }
        }, 300);
      };

      const resetAll = () => {
        setPipelineStep(0);
        setCurrentPrompt("");
        setGenerations([]);
        setChosenData(null);
        setRejectedData(null);
        setSftProgress(0);
        setDpoEpoch(0);
      };

      const renderStepper = () => {
        const steps = [
          { name: "海選生成", activeStep: 1 },
          { name: "RM 打分與過濾", activeStep: 3 },
          { name: "SFT 微調", activeStep: 4 },
          { name: "DPO 拉踩", activeStep: 5 }
        ];

        return (
          <div className="flex justify-between items-center mb-8 relative">
            <div className="absolute left-0 top-1/2 transform -translate-y-1/2 w-full h-1 bg-slate-700 z-0"></div>
            <div className="absolute left-0 top-1/2 transform -translate-y-1/2 h-1 bg-blue-500 z-0 transition-all duration-500" 
                 style={{ width: `${(Math.min(pipelineStep, 5) / 5) * 100}%` }}></div>
            
            {steps.map((s, idx) => {
              const isPast = pipelineStep >= s.activeStep;
              const isCurrent = pipelineStep === s.activeStep - 1 || (idx===3 && pipelineStep === 4);
              return (
                <div key={idx} className="relative z-10 flex flex-col items-center gap-2">
                  <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold border-4 transition-all duration-300
                    ${isPast ? 'bg-blue-500 border-blue-300 text-white' : 
                      isCurrent ? 'bg-slate-800 border-blue-500 text-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.6)]' : 
                      'bg-slate-800 border-slate-600 text-slate-500'}`}>
                    {isPast ? '✓' : idx + 1}
                  </div>
                  <span className={`text-xs font-bold ${isPast || isCurrent ? 'text-blue-300' : 'text-slate-500'}`}>{s.name}</span>
                </div>
              )
            })}
          </div>
        );
      };

      return (
        <div className="flex flex-col h-full p-6 max-w-6xl mx-auto overflow-y-auto">
          {/* Header */}
          <div className="mb-6 border-b border-slate-700 pb-4">
            <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 flex items-center gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
              </svg>
              開源大模型訓練全鏈路模擬器
            </h1>
            <p className="text-slate-400 mt-2 text-sm">
              完整體驗開源模型（如 Llama 3）如何透過 <b>Rejection Sampling (海選) ➡️ SFT (死記硬背好榜樣) ➡️ DPO (價值觀拉踩)</b>，在不使用複雜 PPO 的情況下達成頂尖智商。
            </p>
          </div>

          {renderStepper()}

          {/* --- PHASE 1: Rejection Sampling --- */}
          {pipelineStep < 4 && (
            <div className="flex flex-col gap-4 animate-fadeIn">
              <div className="glass-panel p-5 rounded-xl">
                <h2 className="text-xl font-bold text-blue-300 mb-4 border-b border-slate-600 pb-2">第一站：Rejection Sampling (拒絕採樣海選)</h2>
                
                {pipelineStep === 0 && (
                  <div className="space-y-3">
                    <p className="text-sm text-slate-300 mb-2">請選擇一道題目，讓初始模型「盲猜」產生 4 種不同的回答：</p>
                    {prompts.map((p, idx) => (
                      <button key={idx} onClick={() => handleGenerate(idx)} className="w-full text-left p-4 bg-slate-800 hover:bg-blue-900 rounded-lg transition-colors border border-slate-600 font-medium">
                        <span className="text-blue-400 mr-2">Prompt:</span> {p}
                      </button>
                    ))}
                  </div>
                )}

                {pipelineStep > 0 && (
                  <div className="flex flex-col gap-4">
                    <div className="p-4 bg-blue-900/30 border border-blue-800 rounded-lg">
                      <div className="text-xs text-blue-400 font-bold mb-1 uppercase tracking-widest">當前 Prompt</div>
                      <div className="text-lg">{currentPrompt}</div>
                    </div>

                    <div className="flex justify-between items-center mt-2">
                      <span className="text-sm text-slate-400">模型產生的 4 個回答（尚未打分）：</span>
                      {pipelineStep === 1 && (
                        <button onClick={handleScore} className="bg-purple-600 hover:bg-purple-500 text-white px-5 py-2 rounded-lg font-bold shadow-[0_0_15px_rgba(147,51,234,0.5)] transition-all animate-pulse">
                          呼叫 Reward Model 批次打分
                        </button>
                      )}
                      {pipelineStep === 2 && (
                        <button onClick={handleFilter} className="bg-green-600 hover:bg-green-500 text-white px-5 py-2 rounded-lg font-bold shadow-[0_0_15px_rgba(22,163,74,0.5)] transition-all animate-pulse">
                          執行拒絕採樣 (留最好、抓最壞)
                        </button>
                      )}
                      {pipelineStep === 3 && (
                        <button onClick={handleSftTrain} disabled={isTraining} className={`px-5 py-2 rounded-lg font-bold transition-all ${isTraining ? 'bg-blue-800 text-blue-400' : 'bg-blue-600 hover:bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.5)]'}`}>
                          {isTraining ? 'SFT 微調中...' : '攜帶資料進入 SFT 微調 ➡️'}
                        </button>
                      )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                      {generations.map((gen) => (
                        <div key={gen.id} className={`relative p-4 rounded-xl border-2 transition-all duration-500 ${
                          gen.status === 'pending' ? 'bg-slate-800 border-slate-700' :
                          gen.status === 'accepted' ? 'bg-green-900/30 border-green-500 shadow-[0_0_15px_rgba(22,163,74,0.2)] scale-[1.02] z-10' :
                          gen.status === 'rejected_worst' ? 'bg-red-900/30 border-red-600 shadow-[0_0_15px_rgba(220,38,38,0.2)]' :
                          'bg-slate-800/50 border-slate-700/50 opacity-40 scale-95'
                        }`}>
                          {gen.status === 'accepted' && <div className="absolute -top-3 -right-3 bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">選為 Chosen (SFT用)</div>}
                          {gen.status === 'rejected_worst' && <div className="absolute -top-3 -right-3 bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">選為 Rejected (DPO用)</div>}
                          
                          <p className="text-sm text-slate-300 mb-6">{gen.text}</p>
                          
                          <div className="absolute bottom-3 left-4 right-4 flex justify-between items-center">
                            <span className="text-xs text-slate-500">Answer {gen.id}</span>
                            <div className={`font-mono font-bold text-lg ${
                              gen.displayScore === null ? 'text-slate-600' : 
                              gen.status === 'accepted' ? 'text-green-400' : 
                              gen.status === 'rejected_worst' ? 'text-red-400' : 
                              gen.displayScore > 50 ? 'text-yellow-400' : 'text-slate-500'
                            }`}>
                              {gen.displayScore === null ? '-- pts' : `${gen.displayScore} pts`}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>

                    {pipelineStep === 3 && (
                      <div className="mt-4 p-4 bg-emerald-900/30 border border-emerald-700 rounded-lg animate-slideRight">
                        <p className="text-emerald-300 text-sm">
                          <b>✅ 海選完成！</b><br/>
                          我們找到了完美的 <span className="text-green-400 font-bold">Chosen 答案 ({chosenData?.score}分)</span>，將交給 SFT 讓模型模仿。<br/>
                          同時，我們也特地挑出了最爛的 <span className="text-red-400 font-bold">Rejected 答案 ({rejectedData?.score}分)</span>，這將是稍後 DPO 拉踩訓練的絕佳反面教材！
                        </p>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* --- PHASE 2: SFT & DPO Transition --- */}
          {pipelineStep >= 4 && (
            <div className="flex flex-col gap-6 animate-fadeIn h-full">
              
              <div className="flex gap-6 h-full">
                {/* Left Col: The Annotated Data */}
                <div className="w-1/3 flex flex-col gap-4">
                  <div className="glass-panel p-5 rounded-xl flex-1 border-blue-500/30 shadow-[0_0_20px_rgba(59,130,246,0.1)]">
                    <h3 className="text-sm font-bold text-blue-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z" /></svg>
                      訓練教材庫
                    </h3>
                    
                    <div className="mb-4">
                      <div className="text-xs text-slate-500 mb-1">Prompt</div>
                      <div className="text-sm text-white bg-slate-800 p-2 rounded border border-slate-700">{currentPrompt}</div>
                    </div>

                    <div className="flex flex-col gap-3 relative">
                      <div className="p-3 bg-green-900/20 border border-green-700/50 rounded-lg">
                        <div className="text-xs text-green-500 font-bold mb-1">✅ Chosen (完美示範 - SFT/DPO使用)</div>
                        <div className="text-xs text-green-200 line-clamp-4">{chosenData?.text}</div>
                      </div>
                      
                      {pipelineStep >= 4 && (
                        <div className="p-3 bg-red-900/20 border border-red-700/50 rounded-lg animate-fadeIn">
                          <div className="text-xs text-red-500 font-bold mb-1">❌ Rejected (錯誤示範 - 僅DPO使用)</div>
                          <div className="text-xs text-red-200 line-clamp-4">{rejectedData?.text}</div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                {/* Right Col: The Brain / Training Area */}
                <div className="w-2/3 flex flex-col gap-4">
                  <div className="glass-panel p-6 rounded-xl flex-1 flex flex-col relative overflow-hidden border-purple-500/30 shadow-[0_0_20px_rgba(168,85,247,0.1)]">
                    
                    <h2 className="text-xl font-bold text-white mb-2 flex items-center gap-2">
                      第二站與第三站：SFT ➡️ DPO 訓練核心
                    </h2>

                    {pipelineStep === 4 && (
                      <div className="flex-1 flex flex-col justify-center items-center text-center animate-fadeIn">
                        <div className="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mb-4">
                          <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                        </div>
                        <h3 className="text-2xl font-bold text-green-400 mb-2">SFT 階段已完成！</h3>
                        <p className="text-slate-300 text-sm max-w-md mb-8">
                          模型已經把「Chosen 答案」死記硬背下來了，語氣變得非常專業。但問題來了：<b>它只知道什麼是好，並不知道剛才被淘汰的答案錯在哪裡。</b>
                        </p>
                        <button onClick={() => setPipelineStep(5)} className="bg-purple-600 hover:bg-purple-500 text-white px-8 py-3 rounded-xl font-bold shadow-[0_0_20px_rgba(147,51,234,0.6)] animate-pulseGlow transition-all">
                          啟動 DPO 價值觀拉踩 ➡️
                        </button>
                      </div>
                    )}

                    {pipelineStep === 5 && (
                      <div className="flex-1 flex flex-col animate-slideRight">
                        <div className="flex justify-between items-end mb-6">
                          <div>
                            <div className="text-xs text-slate-400 uppercase tracking-wider mb-1">大腦生成機率觀測</div>
                            <div className={`font-bold text-lg ${dpoEpoch === 10 ? 'text-green-400' : 'text-purple-400'}`}>
                              {dpoEpoch === 0 ? "剛完成 SFT (好壞答案機率相近)" : dpoEpoch < 10 ? "DPO 對比學習中..." : "價值觀拉踩完成！"}
                            </div>
                          </div>
                          <div className="text-right">
                            <div className="text-xs text-slate-400 uppercase tracking-wider mb-1">DPO 演算法迭代</div>
                            <div className="font-mono text-2xl text-white">Epoch: {dpoEpoch}/10</div>
                          </div>
                        </div>

                        {/* Probability Bars */}
                        <div className="space-y-6 mb-8">
                          <div>
                            <div className="flex justify-between text-sm mb-2 font-bold">
                              <span className="text-green-400">P(Chosen | Prompt) - 講出好答案的機率</span>
                              <span className="text-green-300 font-mono">{chosenProb.toFixed(1)}%</span>
                            </div>
                            <div className="h-6 bg-slate-900 rounded-full border border-slate-700 p-0.5">
                              <div className="h-full bg-gradient-to-r from-green-600 to-green-400 rounded-full transition-all duration-300 relative" style={{ width: `${chosenProb}%` }}></div>
                            </div>
                          </div>
                          
                          <div>
                            <div className="flex justify-between text-sm mb-2 font-bold">
                              <span className="text-red-400">P(Rejected | Prompt) - 講出壞答案的機率</span>
                              <span className="text-red-300 font-mono">{rejectedProb.toFixed(1)}%</span>
                            </div>
                            <div className="h-6 bg-slate-900 rounded-full border border-slate-700 p-0.5">
                              <div className="h-full bg-gradient-to-r from-red-600 to-red-400 rounded-full transition-all duration-300 relative" style={{ width: `${rejectedProb}%` }}></div>
                            </div>
                          </div>
                        </div>

                        {/* Control Button */}
                        <div className="mt-auto">
                          {dpoEpoch < 10 ? (
                            <button onClick={handleDpoTrain} disabled={isTraining} className={`w-full py-4 rounded-xl font-black text-lg tracking-widest uppercase transition-all shadow-lg ${isTraining ? 'bg-purple-900 text-purple-300 cursor-wait' : 'bg-purple-600 hover:bg-purple-500 text-white animate-pulseGlow'}`}>
                              {isTraining ? '數學力量拉扯中...' : '執行 DPO 對比學習 (拉踩機制)'}
                            </button>
                          ) : (
                            <div className="space-y-4">
                              <div className="bg-purple-900/30 border border-purple-500/50 p-4 rounded-lg text-sm text-purple-200">
                                <b className="text-purple-400 text-base mb-1 block">🎉 全鏈路訓練大功告成！</b>
                                透過 DPO 的數學懲罰，模型現在不僅熟記好答案，還徹底鄙視了壞答案。這就是開源模型不依賴 PPO (隨隊教練)，依然能對齊人類價值觀的終極奧義！
                              </div>
                              <button onClick={resetAll} className="w-full py-3 rounded-lg font-bold bg-slate-700 hover:bg-slate-600 text-white transition-all">
                                重置全部流程，體驗其他題目
                              </button>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TrainingPipeline />);
  </script>
</body>
</html>
